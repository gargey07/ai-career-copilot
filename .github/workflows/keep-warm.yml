# OBSOLETE as of the 2026-07-10 Render → Coolify/Hostinger VPS migration.
# This existed to fight Render free-tier's ~15-minute idle sleep; the
# backend now runs on an always-on VPS, so there's nothing to keep warm.
# Left in place (URL fixed below) only as an optional external health
# ping — safe to delete this file, or disable it in the Actions tab, at
# any time.
name: Keep backend warm

on:
  schedule:
    - cron: "*/10 * * * *" # every 10 minutes
  workflow_dispatch: {} # manual "warm it up now" button in the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Ping /health
        run: |
          # --max-time 90 tolerates a cold start; never fail the workflow —
          # a missed ping just means the next one wakes the service.
          curl --silent --show-error --max-time 90 \
            http://n99tn44btm3ff0rx5pppaoqp.200.97.165.139.sslip.io/health || true
