# Runs the fetch+match pipeline every night so users wake up to fresh job
# matches — no manual "Run pipeline now" needed. Render's free tier has no
# free cron, so GitHub Actions plays scheduler and calls the admin trigger.
#
# NOTE (2026-07-10, Render → Coolify/Hostinger VPS migration): the backend
# now runs its own in-process daily scheduler (_daily_pipeline_scheduler in
# api/main.py) on the always-on VPS, which covers this same job natively.
# This workflow is redundant but harmless (SETUP below still applies if you
# want the extra external trigger); it's kept as a manual/backup path via
# the Actions tab rather than removed outright.
#
# SETUP (one time): GitHub repo → Settings → Secrets and variables →
# Actions → New repository secret → name ADMIN_TOKEN, value = the same
# ADMIN_TOKEN you set on the backend. Until then this workflow just skips.
name: Nightly job pipeline

on:
  schedule:
    - cron: "30 20 * * *" # 20:30 UTC = 2:00 AM IST
  workflow_dispatch: {} # manual run button in the Actions tab

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger fetch + match
        env:
          ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
        run: |
          if [ -z "$ADMIN_TOKEN" ]; then
            echo "ADMIN_TOKEN secret is not set — skipping. Add it in repo Settings → Secrets → Actions."
            exit 0
          fi
          # --max-time 120 rides out a cold start. The endpoint returns
          # immediately and runs the pipeline in the background.
          curl --silent --show-error --fail --max-time 120 -X POST \
            "http://n99tn44btm3ff0rx5pppaoqp.200.97.165.139.sslip.io/api/admin/run-pipeline?token=${ADMIN_TOKEN}"
