services:
  - type: web
    name: ai-career-copilot-api
    runtime: python
    plan: free
    rootDir: backend
    # Playwright's Chromium renders resume PDFs. The install is retried once
    # (transient download hiccups happen on Render's free build machine),
    # and failure never blocks the deploy — PDF generation then degrades
    # gracefully (matches ship without PDFs, status='pdf_failed' with a
    # reason) instead of the whole API failing to boot. But a silent `||
    # true` on the FIRST attempt meant a failed download here was invisible
    # until someone found stuck PDFs hours later — this version prints a
    # loud warning in the build log instead, so a real failure is caught at
    # deploy time. If you see that warning: Render dashboard → Manual
    # Deploy → "Clear build cache & deploy" to force a fresh download.
    buildCommand: pip install -r requirements.txt && (python -m playwright install chromium || python -m playwright install chromium || echo "XXXXX WARNING: Playwright Chromium install failed twice during build. PDF generation WILL fail until the next successful deploy -- see the download error above, then Render dashboard -> Manual Deploy -> 'Clear build cache & deploy'. XXXXX")
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: FRONTEND_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: APP_SECRET_KEY
        generateValue: true
      # Morning digest email — Gmail app password (Google Account →
      # Security → 2-Step Verification → App passwords). Optional: without
      # these the pipeline still runs, just without emails.
      - key: GMAIL_USER
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
      # See backend/.env.example for the full list of optional integrations
      # (job APIs, email, storage). Add any of those as needed in the
      # Render dashboard — they're not required for the API to boot.
